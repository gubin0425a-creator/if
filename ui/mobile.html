<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronos Mobile v4.2</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #181825;
            --accent-color: #89b4fa;
            --text-color: #cdd6f4;
            --success-color: #a6e3a1;
            --warning-color: #f9e2af;
            --danger-color: #f38ba8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Malgun Gothic', sans-serif;
            overflow-x: hidden;
        }

        #gatekeeper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        input[type="text"] {
            background: #313244;
            border: none;
            padding: 15px;
            color: white;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 14px;
        }

        button {
            background: var(--accent-color);
            color: #1e1e2e;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            background: var(--panel-bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            padding: 15px 0;
            text-align: center;
            font-size: 13px;
            opacity: 0.6;
            border-bottom: 2px solid transparent;
        }

        .tab-item.active {
            opacity: 1;
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        .container {
            padding: 15px;
            padding-bottom: 80px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .card {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 { font-size: 18px; margin-top: 0; color: var(--accent-color); }

        .btn-full { width: 100%; margin-top: 10px; }

        .log-box {
            background: #11111b;
            color: var(--success-color);
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <h1>🔐 보안 인증</h1>
        <p>서버 터미널에 표시된<br><b>50자 마스터 코드</b>를 입력하세요.</p>
        <input type="text" id="access_code" placeholder="마스터 코드 입력">
        <button onclick="unlock()">인증하기</button>
        <p id="auth_msg" style="color: var(--danger-color); margin-top: 10px;"></p>
    </div>

    <div id="main_ui" style="display: none;">
        <div id="update_banner" style="background: var(--success-color); color: #1e1e2e; text-align: center; font-size: 11px; padding: 5px; display: none;">
            🚀 PC 버전의 새로운 엔진 기능이 모바일에 자동 업데이트되었습니다.
        </div>
        <div class="tab-bar">
            <div class="tab-item active" onclick="switchTab(0)">기획</div>
            <div class="tab-item" onclick="switchTab(1)">생산</div>
            <div class="tab-item" onclick="switchTab(2)">최적화</div>
            <div class="tab-item" onclick="switchTab(3)">보관함</div>
        </div>

        <div class="container">
            <!-- Tab 0: Planning -->
            <div id="sec0" class="section active">
                <div class="card">
                    <h2>🪄 AI 주제 추천</h2>
                    <input type="text" id="topic" style="width: 100%; box-sizing: border-box;" placeholder="주제 입력 (예: 임진왜란)">
                    <button class="btn-full" onclick="getRecommendations()">추천받기</button>
                </div>
                <div id="recommendation_list"></div>
            </div>

            <!-- Tab 1: Production -->
            <div id="sec1" class="section">
                <div class="card">
                    <h2>🏭 풀-오토 공장</h2>
                    <p style="font-size: 12px;">30분 동안 3개의 영상을 자동 제작 및 업로드합니다.</p>
                    <button class="btn-full" style="background: var(--success-color);" onclick="startFactory()">공장 가동 시작</button>
                </div>
                <div class="card">
                    <h2>⚙️ 실시간 엔진 로그</h2>
                    <div id="mobile_log" class="log-box">대기 중...</div>
                </div>
            </div>

            <!-- Tab 2: Optimization -->
            <div id="sec2" class="section">
                <div class="card">
                    <h2>💯 SEO 100점 CPR</h2>
                    <p>보관함에서 선택한 영상의 알고리즘을 소생시킵니다.</p>
                    <button class="btn-full" style="background: var(--warning-color);">즉시 소생술 실행</button>
                </div>
            </div>

            <!-- Tab 3: Library -->
            <div id="sec3" class="section">
                <h2>🎬 제작 완료 목록</h2>
                <div id="video_list"></div>
            </div>
        </div>
    </div>

    <script>
        let masterCode = "";

        async function unlock() {
            const code = document.getElementById('access_code').value;
            const res = await fetch('/api/verify_code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code})
            });
            if (res.ok) {
                masterCode = code;
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('main_ui').style.display = 'block';
                loadVideos();
            } else {
                document.getElementById('auth_msg').innerText = "인증 실패: 코드를 다시 확인하세요.";
            }
        }

        function switchTab(idx) {
            document.querySelectorAll('.tab-item').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });
            document.querySelectorAll('.section').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });
        }

        async function getRecommendations() {
            const topic = document.getElementById('topic').value;
            const res = await fetch('/api/recommend', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({topic})
            });
            const data = await res.json();
            const list = document.getElementById('recommendation_list');
            list.innerHTML = "";
            data.topics.forEach(t => {
                const div = document.createElement('div');
                div.className = "card";
                div.innerHTML = `<h3>${t.title}</h3><p>${t.hook}</p><button class="btn-full" onclick="startGen('${t.title}', '${t.hook}')">생성 시작</button>`;
                list.appendChild(div);
            });
        }

        async function loadVideos() {
            const res = await fetch('/api/videos');
            const data = await res.json();
            const list = document.getElementById('video_list');
            list.innerHTML = "";
            data.videos.forEach(v => {
                const div = document.createElement('div');
                div.className = "card";
                div.innerHTML = `<b>${v.title}</b><br><span style="font-size: 11px;">SEO: ${v.seo_score}점 | ${v.filename}</span>`;
                list.appendChild(div);
            });
        }

        function startFactory() {
            alert("공장 가동을 시작합니다. 로그 창을 확인하세요.");
            // API 호출 로직...
        }
    </script>
</body>
</html>
